<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ค้นหาหมายจับ | Warrant Tracker</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* โทนสี: น้ำเงินเข้ม (#0f172a, #1e3a8a), ดำ (#111827), ขาว (#ffffff) */
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a; /* พื้นหลังน้ำเงินเข้ม/ดำ */
      background-image: radial-gradient(circle at top right, #1e3a8a 0%, #0f172a 60%);
      min-height: 100vh;
      padding: 24px 16px;
      color: #111827;
    }

    .container {
      max-width: 680px; /* บีบให้กระชับขึ้น มินิมอล */
      margin: 0 auto;
    }

    /* Main Card สีขาวสะอาดตา */
    .glass-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: #0f172a; /* สีน้ำเงินเข้มจัดเกือบดำ */
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      color: #64748b;
      font-size: 14px;
    }

    /* Profile Section (Clean Style) */
    .profile-section {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 28px;
    }

    .profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1e3a8a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .profile-info h4 {
      font-size: 15px;
      font-weight: 600;
      color: #0f172a;
    }

    /* ซ่อน User ID ตามที่ต้องการ แต่ยังเก็บ Tag ไว้ให้ JS ใช้งานได้ */
    #userIdDisplay {
      display: none; 
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ecfdf5;
      color: #059669;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #a7f3d0;
    }

    /* Search Type Toggle (Segmented Control แบบเรียบหรู) */
    .search-type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: #f1f5f9;
      padding: 6px;
      border-radius: 12px;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #64748b;
    }

    .toggle-btn.active {
      background: #ffffff;
      color: #0f172a;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    /* Input Group */
    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 16px;
      font-size: 15px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #ffffff;
      transition: all 0.2s ease;
      font-family: inherit;
      color: #0f172a;
    }

    .input-group input:focus {
      outline: none;
      border-color: #1e3a8a;
      box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
    }

    /* ซ่อนลูกศรใน input type="number" */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Button Group */
    .button-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ปุ่มหลักเน้นน้ำเงินเข้ม */
    .btn-primary {
      background: #0f172a;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #1e3a8a;
      transform: translateY(-1px);
    }

    /* ปุ่มรองเน้นขาว-เทา */
    .btn-secondary {
      background: #ffffff;
      color: #475569;
      border: 1px solid #cbd5e1;
    }

    .btn-secondary:hover {
      background: #f8fafc;
      color: #0f172a;
    }

    /* Result Table */
    .result-section {
      margin-top: 24px;
    }

    .result-title {
      font-size: 15px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f1f5f9;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
    }

    .result-table th {
      text-align: left;
      padding: 12px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      border-bottom: 1px solid #e2e8f0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .result-table td {
      padding: 16px 8px;
      font-size: 14px;
      color: #334155;
      border-bottom: 1px solid #f1f5f9;
    }

    .result-table tr:last-child td {
      border-bottom: none;
    }

    .sheet-badge {
      background: #f1f5f9;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      border: 1px solid #e2e8f0;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.85); /* เปลี่ยนเป็นโทนเข้มโปร่งแสง */
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      transition: all 0.3s ease;
    }

    .loading-content {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f1f5f9;
      border-top-color: #1e3a8a; /* Spinner สีน้ำเงิน */
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-content p {
      color: #0f172a;
      font-size: 15px;
      font-weight: 600;
    }

    /* Message Boxes (Clean Design) */
    .info-box, .error-box, .success-box {
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 500;
    }

    .info-box {
      background: #f8fafc;
      color: #475569;
      border: 1px solid #e2e8f0;
    }

    .error-box {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .success-box {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
      }
      .glass-card {
        padding: 24px 20px;
      }
      .btn {
        padding: 12px;
        font-size: 14px;
      }
      .result-table th, .result-table td {
        font-size: 13px;
        padding: 12px 4px;
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-content">
    <div class="spinner"></div>
    <p>กำลังตรวจสอบสิทธิ์</p>
    <p style="font-size: 13px; margin-top: 8px; color: #64748b; font-weight: 400;">กรุณารอสักครู่...</p>
  </div>
</div>

<div class="container">
  <div class="glass-card">
    <div class="header">
      <h1><i class="fas fa-search" style="color: #1e3a8a; margin-right: 8px;"></i> ระบบค้นหาหมายจับ</h1>
      <p>ค้นหาจากฐานข้อมูลส่วนกลาง</p>
    </div>

    <div id="profileSection" class="profile-section hidden">
      <div class="profile-avatar" id="profileAvatar">
        <i class="fas fa-user"></i>
      </div>
      <div class="profile-info">
        <h4 id="userName">-</h4>
        <p id="userIdDisplay">กำลังโหลด...</p> </div>
      <div style="margin-left: auto;">
        <span class="status-badge"><i class="fas fa-check-circle"></i> พร้อมใช้งาน</span>
      </div>
    </div>

    <div class="search-type-toggle">
      <button class="toggle-btn active" data-type="id13">
        <i class="fas fa-id-card"></i> เลข 13 หลัก
      </button>
      <button class="toggle-btn" data-type="name">
        <i class="fas fa-user"></i> ชื่อ-สกุล
      </button>
    </div>

    <div class="input-group">
      <label><i class="fas fa-keyboard" style="margin-right: 4px; color: #64748b;"></i> ข้อมูลคำค้นหา</label>
      <input type="number" id="searchInput" placeholder="กรอกเลขประจำตัวประชาชน 13 หลัก" autocomplete="off">
    </div>

    <div class="button-group">
      <button class="btn btn-primary" id="searchBtn">
        <i class="fas fa-search"></i> ค้นหา
      </button>
      <button class="btn btn-secondary" id="clearBtn">
        <i class="fas fa-redo-alt"></i> ล้างค่า
      </button>
    </div>

    <div class="result-section" id="resultArea">
      <div class="info-box">
        <i class="fas fa-info-circle"></i> กรุณากรอกข้อมูลเพื่อเริ่มการค้นหา
      </div>
    </div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/versions/2.23.0/sdk.js"></script>
<script>
  // ========== CONFIGURATION ==========
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxQJvzBmxO09-N4smPuJS4JwS5U8rM738fJRkWFXs-r-sVA-myuLPxjIqZJHj5Y_62fEg/exec";  
  const LIFF_ID = "2010276759-IZoVxJjH";          
  // ===================================

  let lineProfile = { userId: '', displayName: '', pictureUrl: '' };
  let currentSearchType = "id13";
  let isAuthorized = false;

  // แสดง/ซ่อน Loading
  function showLoading(show, customText = null) {
    const overlay = document.getElementById("loadingOverlay");
    if (show) {
      if (customText) {
        overlay.querySelectorAll("p")[0].innerText = customText;
      }
      overlay.style.display = "flex";
    } else {
      overlay.style.display = "none";
      overlay.querySelectorAll("p")[0].innerText = "กำลังตรวจสอบสิทธิ์";
    }
  }

  // แสดงผลลัพธ์
  function showResult(type, message, data = null) {
    const resultDiv = document.getElementById("resultArea");
    
    if (type === "info") {
      resultDiv.innerHTML = `<div class="info-box"><i class="fas fa-info-circle"></i> ${message}</div>`;
    } else if (type === "error") {
      resultDiv.innerHTML = `<div class="error-box"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
    } else if (type === "success") {
      resultDiv.innerHTML = `<div class="success-box"><i class="fas fa-check-circle"></i> ${message}</div>`;
    } else if (type === "table" && data) {
      if (data.length === 0) {
        resultDiv.innerHTML = `<div class="info-box"><i class="fas fa-search"></i> ไม่พบข้อมูลที่ค้นหาในระบบ</div>`;
        return;
      }
      
      let html = `
        <div class="result-title">
          <i class="fas fa-list-ul" style="color:#1e3a8a;"></i> ผลการค้นหาพบ ${data.length} รายการ
        </div>
        <table class="result-table">
          <thead>
            <tr><th>เลขที่หมายจับ</th><th>ชื่อ-สกุล</th><th>สถานะ</th><th>ที่มา</th></tr>
          </thead>
          <tbody>
      `;
      
      for (let row of data) {
        html += `
          <tr>
            <td style="font-weight:500;">${escapeHtml(row.warrantNo || '-')}</td>
            <td>${escapeHtml(row.fullName || '-')}</td>
            <td>${escapeHtml(row.status || '-')}</td>
            <td><span class="sheet-badge">${escapeHtml(row.sheetName || '-')}</span></td>
          </tr>
        `;
      }
      
      html += `</tbody></table>`;
      resultDiv.innerHTML = html;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function showDebugUserId(message, userIdValue = null) {
    const userIdToShow = userIdValue || lineProfile.userId || "ไม่สามารถดึง User ID ได้";
    const resultDiv = document.getElementById("resultArea");
    
    let debugHtml = `
      <div style="background: #fffbeb; border: 1px solid #fef08a; border-radius: 12px; padding: 20px;">
        <div style="color: #854d0e; font-weight: 600; margin-bottom: 12px; display:flex; align-items:center; gap:8px;">
          <i class="fas fa-lock"></i> ${message}
        </div>
        <div style="background: #ffffff; color: #334155; padding: 12px; border-radius: 8px; border: 1px dashed #cbd5e1; font-family: monospace; font-size: 13px; word-break: break-all;">
          <strong style="color: #0f172a;">User ID:</strong><br>
          <span id="debugUserIdText">${userIdToShow}</span>
        </div>
        <div style="margin-top: 16px; display: flex; gap: 10px;">
          <button onclick="copyDebugUserId()" style="flex:1; background: #0f172a; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px;">
            <i class="fas fa-copy"></i> คัดลอก ID
          </button>
        </div>
      </div>
    `;
    
    resultDiv.innerHTML = debugHtml;
    window.copyDebugUserId = function() {
      const text = document.getElementById("debugUserIdText").innerText;
      navigator.clipboard.writeText(text);
      alert("✅ คัดลอก User ID เรียบร้อยแล้ว");
    };
  }

  // เรียก GAS
  async function callGas(action, payload = {}) {
  if (!GAS_URL || !GAS_URL.startsWith("https://script.google.com/macros/s/") || !GAS_URL.endsWith("/exec")) {
    showDebugUserId("ยังไม่ได้ตั้งค่าระบบหลังบ้าน", "กรุณาติดต่อผู้ดูแลระบบ");
    throw new Error("GAS_URL not configured");
  }
  
  if (!lineProfile.userId) {
    showDebugUserId("กรุณาเข้าสู่ระบบผ่าน LINE", "ยังไม่ได้รับสิทธิ์");
    throw new Error("Not logged in");
  }
  
  try {
    const response = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: action,
        userId: lineProfile.userId,
        displayName: lineProfile.displayName,
        ...payload
      })
    });
    
    return await response.json();
    
  } catch(err) {
    console.error("callGas error:", err);
    showResult("error", "ไม่สามารถเชื่อมต่อระบบได้ โปรดลองอีกครั้ง");
    throw err;
  }
}

  // ค้นหา
  async function performSearch() {
    const searchInput = document.getElementById("searchInput");
    const keyword = searchInput.value.trim();
    
    if (!keyword) {
      showResult("error", "กรุณากรอกคำค้นหา");
      return;
    }
    
    showLoading(true, "กำลังค้นหาข้อมูล...");
    
    try {
      const result = await callGas("search", {
        searchType: currentSearchType,
        keyword: keyword
      });
      
      if (result.success === false) {
        if (result.error === "Unauthorized user") {
          showDebugUserId("คุณไม่มีสิทธิ์เข้าใช้งานระบบ", lineProfile.userId);
        } else {
          showResult("error", result.error || "เกิดข้อผิดพลาดในการค้นหา");
        }
      } else {
        showResult("table", "", result.data || []);
        searchInput.value = ""; 
      }
      
    } catch(err) {
      console.error(err);
      showResult("error", "เกิดข้อผิดพลาด: " + err.message);
    } finally {
      showLoading(false);
    }
  }

  function clearForm() {
    document.getElementById("searchInput").value = "";
    showResult("info", "พร้อมสำหรับการค้นหาใหม่");
  }

  // LIFF Init
  function initLiff() {
    return new Promise((resolve, reject) => {
      liff.init({ liffId: LIFF_ID }, () => {
        if (liff.isLoggedIn()) {
          liff.getProfile().then(profile => {
            lineProfile.userId = profile.userId;
            lineProfile.displayName = profile.displayName;
            lineProfile.pictureUrl = profile.pictureUrl || "";
            
            // อัปเดต UI
            document.getElementById("userName").innerText = profile.displayName;
            document.getElementById("userIdDisplay").innerText = profile.userId; // ซ่อนใน CSS แล้ว
            
            const avatarDiv = document.getElementById("profileAvatar");
            if (profile.pictureUrl) {
              avatarDiv.innerHTML = `<img src="${profile.pictureUrl}" alt="Profile">`;
            } else {
              avatarDiv.innerHTML = `<i class="fas fa-user"></i>`;
            }
            
            document.getElementById("profileSection").classList.remove("hidden");
            
            resolve(true);
          }).catch(err => {
            console.error("getProfile error:", err);
            reject(err);
          });
        } else {
          liff.login();
          reject(new Error("Need login"));
        }
      }, err => {
        console.error("liff.init error:", err);
        reject(err);
      });
    });
  }

  // Event Listeners
  document.getElementById("searchBtn").addEventListener("click", performSearch);
  document.getElementById("clearBtn").addEventListener("click", clearForm);
  document.getElementById("searchInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") performSearch();
  });
  
  document.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.addEventListener("click", function() {
      // 1. จัดการ Class active
      document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
      this.classList.add("active");
      
      // 2. อัปเดตสถานะ
      currentSearchType = this.getAttribute("data-type");
      const input = document.getElementById("searchInput");
      
      // 3. ปรับคุณสมบัติของ input ให้ตรงตามโหมด
      if (currentSearchType === "id13") {
        input.type = "number";           
        input.inputMode = "numeric";     
        input.placeholder = "กรอกเลขประจำตัวประชาชน 13 หลัก";
      } else {
        input.type = "text";             
        input.inputMode = "text";        
        input.placeholder = "กรอกชื่อ-นามสกุล";
      }
      
      // 4. ล้างค่า
      input.value = "";
      input.focus();
    });
  });

  // เริ่มต้น
  window.addEventListener("DOMContentLoaded", async () => {
    showLoading(true);
    
    try {
      await initLiff();
      showResult("info", "เข้าสู่ระบบสำเร็จ กรุณากรอกข้อมูลที่ต้องการค้นหา");
    } catch (err) {
      console.error("Init error:", err);
      showDebugUserId("เชื่อมต่อ LINE ไม่สำเร็จ", "ไม่สามารถเข้าสู่ระบบได้");
    } finally {
      setTimeout(() => showLoading(false), 500);
    }
  });
</script>
</body>
</html>
