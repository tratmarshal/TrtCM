<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0a192f">
  <title>Warrant Tracker | ค้นหาหมายจับ</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary-color: #0d2b4d;
      --primary-light: #16437a;
      --accent-color: #0070f3;
      --bg-dark: #071120;
      --bg-gradient: radial-gradient(circle at top right, #112d4e, #0a192f 40%, #030a14);
      --text-main: #1e293b;
      --text-muted: #64748b;
      --card-bg: rgba(255, 255, 255, 0.98);
      --border-color: rgba(226, 232, 240, 0.8);
      --radius-lg: 24px;
      --radius-md: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      padding: 24px 16px;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      animation: slideUpFade 0.6s ease-out;
    }

    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glass-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 
                  0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    /* Top glowing accent line */
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #0070f3, #00c6ff);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-color), #2563eb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header h1 i {
      color: var(--primary-color);
      font-size: 26px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
    }

    /* Profile Section */
    .profile-section {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: #f8fafc;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      margin-bottom: 28px;
    }

    .profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary-color));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      box-shadow: 0 4px 10px rgba(13, 43, 77, 0.2);
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      flex: 1;
    }

    .profile-info h4 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #dcfce7;
      color: #166534;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-badge i {
      font-size: 10px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Toggle Switch (Segmented Control) */
    .search-type-toggle {
      display: flex;
      background: #f1f5f9;
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .toggle-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .toggle-btn.active {
      background: #ffffff;
      color: var(--primary-color);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    /* Input Fields */
    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      background: #ffffff;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--text-main);
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 4px rgba(0, 112, 243, 0.1);
    }

    .input-group input::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
      color: white;
      box-shadow: 0 6px 16px rgba(13, 43, 77, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(13, 43, 77, 0.35);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: var(--text-main);
      border: 1px solid #e2e8f0;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
      color: var(--primary-color);
    }

    /* Results Section */
    .result-section {
      min-height: 80px;
      animation: fadeIn 0.4s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .result-title i {
      color: var(--accent-color);
    }

    /* Table Design */
    .table-container {
      border-radius: 12px;
      border: 1px solid var(--border-color);
      overflow: hidden;
      background: #fff;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .result-table th {
      padding: 14px 16px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      background: #f8fafc;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border-color);
    }

    .result-table td {
      padding: 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      border-bottom: 1px solid #f1f5f9;
    }

    .result-table tbody tr {
      transition: background 0.2s;
    }

    .result-table tbody tr:hover {
      background-color: #f8fafc;
    }

    .result-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* Status Boxes */
    .info-box, .error-box, .success-box {
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.5;
    }

    .info-box i, .error-box i, .success-box i {
      font-size: 18px;
    }

    .info-box {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    .error-box {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .success-box {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7, 17, 32, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }
    
    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .loading-content {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .loading-overlay.active .loading-content {
      transform: scale(1);
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #f1f5f9;
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-content p {
      color: var(--text-main);
      font-weight: 600;
      font-size: 15px;
    }

    .loading-content span {
      display: block;
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 8px;
    }

    /* Mobile Responsive */
    @media (max-width: 600px) {
      .glass-card { padding: 24px; }
      .header h1 { font-size: 24px; }
      .profile-section { flex-direction: column; text-align: center; gap: 10px; }
      .profile-info { width: 100%; }
      .button-group { flex-direction: column; }
      .btn { width: 100%; padding: 16px; }
      .result-table th, .result-table td { padding: 12px 10px; font-size: 13px; }
    }

    .hidden { display: none !important; }

    /* Debug Card */
    .debug-card {
      background: #fffbeb;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #fde68a;
    }
  </style>
</head>
<body>

<!-- Loading State -->
<div id="loadingOverlay" class="loading-overlay active">
  <div class="loading-content">
    <div class="spinner"></div>
    <p id="loadingText">กำลังตรวจสอบสิทธิ์</p>
    <span>กรุณารอสักครู่...</span>
  </div>
</div>

<div class="container">
  <div class="glass-card">
    <div class="header">
      <h1><i class="fas fa-shield-alt"></i> WARRANT TRACKER</h1>
      <p>ระบบค้นหาหมายจับอัจฉริยะ • เชื่อมต่อฐานข้อมูลกลาง</p>
    </div>

    <div id="profileSection" class="profile-section hidden">
      <div class="profile-avatar" id="profileAvatar">
        <i class="fas fa-user"></i>
      </div>
      <div class="profile-info">
        <h4 id="userName">-</h4>
        <span class="status-badge"><i class="fas fa-circle"></i> พร้อมใช้งาน</span>
      </div>
    </div>

    <div class="search-type-toggle">
      <button class="toggle-btn active" data-type="id13">
        <i class="fas fa-id-card"></i> เลขบัตรประชาชน
      </button>
      <button class="toggle-btn" data-type="name">
        <i class="fas fa-users"></i> ชื่อ - นามสกุล
      </button>
    </div>

    <div class="input-group">
      <label><i class="fas fa-search"></i> ระบุคำค้นหา</label>
      <input type="number" id="searchInput" placeholder="กรอกเลขบัตรประชาชน 13 หลัก" autocomplete="off">
    </div>

    <div class="button-group">
      <button class="btn btn-primary" id="searchBtn">
        <i class="fas fa-search"></i> ค้นหาข้อมูล
      </button>
      <button class="btn btn-secondary" id="clearBtn">
        <i class="fas fa-eraser"></i> ล้างค่า
      </button>
    </div>

    <div class="result-section" id="resultArea">
      <div class="info-box">
        <i class="fas fa-info-circle"></i> กรุณากรอกข้อมูลแล้วกดค้นหา เพื่อตรวจสอบประวัติ
      </div>
    </div>
  </div>
</div>

<span id="userIdDisplay" class="hidden"></span>

<script src="https://static.line-scdn.net/liff/edge/versions/2.23.0/sdk.js"></script>
<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxQJvzBmxO09-N4smPuJS4JwS5U8rM738fJRkWFXs-r-sVA-myuLPxjIqZJHj5Y_62fEg/exec";  
  const LIFF_ID = "2010276759-IZoVxJjH";          

  let lineProfile = { userId: '', displayName: '', pictureUrl: '' };
  let currentSearchType = "id13";
  let isAuthorized = false;

  function showLoading(show, customText = null) {
    const overlay = document.getElementById("loadingOverlay");
    const textElem = document.getElementById("loadingText");
    
    if (show) {
      if (customText) textElem.innerText = customText;
      overlay.classList.add("active");
    } else {
      overlay.classList.remove("active");
      setTimeout(() => { textElem.innerText = "กำลังตรวจสอบสิทธิ์"; }, 300);
    }
  }

  function showResult(type, message, data = null) {
    const resultDiv = document.getElementById("resultArea");
    
    // Reset animation by triggering reflow
    resultDiv.style.animation = 'none';
    resultDiv.offsetHeight; 
    resultDiv.style.animation = null; 

    if (type === "info") {
      resultDiv.innerHTML = `<div class="info-box"><i class="fas fa-info-circle"></i> ${message}</div>`;
    } else if (type === "error") {
      resultDiv.innerHTML = `<div class="error-box"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
    } else if (type === "success") {
      resultDiv.innerHTML = `<div class="success-box"><i class="fas fa-check-circle"></i> ${message}</div>`;
    } else if (type === "table" && data) {
      if (data.length === 0) {
        resultDiv.innerHTML = `<div class="info-box"><i class="fas fa-search"></i> ไม่พบข้อมูลหมายจับจากคำค้นหานี้</div>`;
        return;
      }
      
      let html = `
        <div class="result-title">
          <i class="fas fa-list-ul"></i> ผลการค้นหาพบ ${data.length} รายการ
        </div>
        <div class="table-container">
          <table class="result-table">
            <thead>
              <tr><th>เลขที่หมายจับ</th><th>ชื่อ-สกุล</th><th>สถานะ</th></tr>
            </thead>
            <tbody>
      `;
      
      for (let row of data) {
        // เพิ่มสีให้กับสถานะเบื้องต้น (สามารถปรับแก้เงื่อนไขได้ตามข้อมูลจริง)
        let statusColor = "inherit";
        if(row.status && row.status.includes('จับกุมแล้ว')) statusColor = "#15803d"; // Green
        else if(row.status && row.status.includes('หลบหนี')) statusColor = "#b91c1c"; // Red

        html += `
          <tr>
            <td style="font-weight: 700; color: var(--primary-light);">${escapeHtml(row.warrantNo || '-')}</td>
            <td>${escapeHtml(row.fullName || '-')}</td>
            <td style="color: ${statusColor}; font-weight: 600;">${escapeHtml(row.status || '-')}</td>
          </tr>
        `;
      }
      
      html += `</tbody></table></div>`;
      resultDiv.innerHTML = html;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function showDebugUserId(message, userIdValue = null) {
    const userIdToShow = userIdValue || lineProfile.userId || "ไม่สามารถดึง User ID ได้";
    const resultDiv = document.getElementById("resultArea");
    
    let debugHtml = `
      <div class="debug-card">
        <div style="color: #b45309; font-weight: 700; margin-bottom: 16px; display: flex; gap: 8px; align-items: center; font-size: 15px;">
          <i class="fas fa-shield-alt"></i> ${message}
        </div>
        <div style="background: #1e293b; color: #f8fafc; padding: 16px; border-radius: 12px; font-family: monospace; font-size: 13px; word-break: break-all; margin-bottom: 16px;">
          <strong style="color: #fbbf24;">🆔 User ID:</strong><br>
          <span id="debugUserIdText" style="display: block; margin-top: 6px; color: #bae6fd;">${userIdToShow}</span>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button onclick="copyDebugUserId()" class="btn btn-primary" style="flex: 1; padding: 10px; font-size: 13px;">
            <i class="fas fa-copy"></i> คัดลอก ID
          </button>
          <button onclick="location.reload()" class="btn btn-secondary" style="flex: 1; padding: 10px; font-size: 13px;">
            <i class="fas fa-sync-alt"></i> โหลดใหม่
          </button>
        </div>
        <div style="margin-top: 16px; font-size: 12px; color: #92400e; text-align: center;">
          <i class="fas fa-info-circle"></i> กรุณาส่ง User ID นี้ให้ผู้ดูแลระบบเพื่อเปิดสิทธิ์
        </div>
      </div>
    `;
    resultDiv.innerHTML = debugHtml;
    window.copyDebugUserId = function() {
      const text = document.getElementById("debugUserIdText").innerText;
      navigator.clipboard.writeText(text).then(() => {
        alert("✅ คัดลอก User ID เรียบร้อยแล้ว");
      }).catch(() => {
        // Fallback for older browsers
        const tempInput = document.createElement("input");
        tempInput.value = text;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        alert("✅ คัดลอก User ID เรียบร้อยแล้ว");
      });
    };
  }

  async function callGas(action, payload = {}) {
    if (!GAS_URL || !GAS_URL.startsWith("https://script.google.com/macros/s/") || !GAS_URL.endsWith("/exec")) {
      showDebugUserId("การตั้งค่าระบบไม่สมบูรณ์ (GAS_URL)", "กรุณาติดต่อผู้ดูแลระบบ");
      throw new Error("GAS_URL not configured");
    }
    if (!lineProfile.userId) {
      showDebugUserId("ไม่พบข้อมูลการล็อกอิน LINE", "กรุณาเปิดผ่านแอปพลิเคชัน LINE");
      throw new Error("Not logged in");
    }
    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          action: action,
          userId: lineProfile.userId,
          displayName: lineProfile.displayName,
          ...payload
        })
      });
      return await response.json();
    } catch(err) {
      console.error("callGas error:", err);
      showResult("error", "ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาลองใหม่อีกครั้ง");
      throw err;
    }
  }

  async function performSearch() {
    const searchInput = document.getElementById("searchInput");
    let keyword = searchInput.value.trim();
    
    if (!keyword) {
      showResult("error", "กรุณาระบุข้อมูลที่ต้องการค้นหา");
      searchInput.focus();
      return;
    }
    
    if (currentSearchType === "id13") {
      if (!/^\d{13}$/.test(keyword)) {
        showResult("error", "กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลัก (เฉพาะตัวเลข)");
        return;
      }
    } else if (currentSearchType === "name") {
      if (keyword.length < 2) {
        showResult("error", "กรุณากรอกชื่ออย่างน้อย 2 ตัวอักษร");
        return;
      }
    }
    
    showLoading(true, "กำลังค้นหาข้อมูลในฐานระบบ...");
    try {
      const result = await callGas("search", {
        searchType: currentSearchType,
        keyword: keyword
      });
      
      if (result && result.success === false) {
        showResult("error", result.message || "เกิดข้อผิดพลาดในการค้นหา");
      } else {
        showResult("table", "", result.data || []);
      }
    } catch(err) {
      console.error(err);
      // Error message is already handled in callGas
    } finally {
      showLoading(false);
    }
  }

  function clearForm() {
    const input = document.getElementById("searchInput");
    input.value = "";
    input.focus();
    showResult("info", "รีเซ็ตข้อมูลเรียบร้อย พร้อมสำหรับการค้นหาใหม่");
  }

  function initLiff() {
    return new Promise((resolve, reject) => {
      liff.init({ liffId: LIFF_ID }, () => {
        if (liff.isLoggedIn()) {
          liff.getProfile().then(profile => {
            lineProfile.userId = profile.userId;
            lineProfile.displayName = profile.displayName;
            lineProfile.pictureUrl = profile.pictureUrl || "";
            
            document.getElementById("userName").innerText = profile.displayName;
            
            const hiddenUserIdSpan = document.getElementById("userIdDisplay");
            if(hiddenUserIdSpan) hiddenUserIdSpan.innerText = profile.userId;
            
            const avatarDiv = document.getElementById("profileAvatar");
            if (profile.pictureUrl) {
              avatarDiv.innerHTML = `<img src="${profile.pictureUrl}" alt="Profile">`;
            } else {
              avatarDiv.innerHTML = `<i class="fas fa-user"></i>`;
            }
            document.getElementById("profileSection").classList.remove("hidden");
            resolve(true);
          }).catch(err => {
            console.error("getProfile error:", err);
            reject(err);
          });
        } else {
          liff.login();
          reject(new Error("Need login"));
        }
      }, err => {
        console.error("liff.init error:", err);
        reject(err);
      });
    });
  }

  // Event Listeners
  document.getElementById("searchBtn").addEventListener("click", performSearch);
  document.getElementById("clearBtn").addEventListener("click", clearForm);
  
  document.getElementById("searchInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") performSearch();
  });
  
  document.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.addEventListener("click", function() {
      // Update UI state
      document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
      this.classList.add("active");
      
      // Update Logic state
      currentSearchType = this.getAttribute("data-type");
      const input = document.getElementById("searchInput");
      
      if (currentSearchType === "id13") {
        input.type = "number";
        input.inputMode = "numeric";
        input.placeholder = "กรอกเลขบัตรประชาชน 13 หลัก";
      } else {
        input.type = "text";
        input.inputMode = "text";
        input.placeholder = "กรอกชื่อ-สกุล (เช่น สมชาย จริงใจ)";
      }
      
      input.value = "";
      input.focus();
    });
  });

  // Init App
  window.addEventListener("DOMContentLoaded", async () => {
    try {
      await initLiff();
      showResult("info", "ระบบพร้อมใช้งาน กรุณากรอกข้อมูลเพื่อค้นหา");
    } catch (err) {
      console.error("Init error:", err);
      showDebugUserId("ไม่สามารถยืนยันตัวตนผ่าน LINE ได้", "กรุณาเปิดลิงก์นี้ในแอปพลิเคชัน LINE");
    } finally {
      // Add slight delay so the loading screen doesn't just flash quickly
      setTimeout(() => showLoading(false), 800);
    }
  });
</script>
</body>
</html>
