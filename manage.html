<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>จัดการหมายจับ | Warrant Tracker</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 28px 24px;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .profile-section {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      border-radius: 24px;
      margin-bottom: 24px;
    }

    .profile-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: 600;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .status-badge {
      background: #10b981;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-left: auto;
    }

    .btn-add {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .btn-add:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 14px 12px;
      background: #f8fafc;
      font-weight: 600;
      color: #1e293b;
      font-size: 13px;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 14px;
    }

    .status-chip {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-pending { background: #fef3c7; color: #92400e; }
    .status-progress { background: #dbeafe; color: #1e40af; }
    .status-done { background: #d1fae5; color: #065f46; }

    .btn-edit {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .btn-edit:hover {
      background: #2563eb;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 10001;
    }

    .modal-content {
      background: white;
      border-radius: 32px;
      max-width: 500px;
      width: 90%;
      padding: 28px;
    }

    .modal-content h3 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    .modal-content input, .modal-content select {
      width: 100%;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      margin: 12px 0;
      font-size: 14px;
    }

    .modal-content button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e5e7eb;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .info-box, .error-box {
      padding: 20px;
      border-radius: 20px;
      text-align: center;
    }

    .info-box { background: #eff6ff; color: #1e40af; }
    .error-box { background: #fef2f2; color: #dc2626; }

    .hidden { display: none; }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
</div>

<div class="container">
  <div class="glass-card">
    <div class="header">
      <h1><i class="fas fa-tasks"></i> จัดการหมายจับ</h1>
    </div>

    <div id="profileSection" class="profile-section hidden">
      <div class="profile-avatar" id="profileAvatar"><i class="fas fa-user"></i></div>
      <div><strong id="userName">-</strong><br><small id="userIdDisplay">กำลังโหลด...</small></div>
      <div class="status-badge"><i class="fas fa-check-circle"></i> เจ้าหน้าที่</div>
    </div>

    <button class="btn-add" id="addProcessBtn"><i class="fas fa-plus-circle"></i> เพิ่มรายการดำเนินการ</button>

    <div id="pendingList">
      <div class="info-box"><i class="fas fa-spinner fa-pulse"></i> กำลังโหลดข้อมูล...</div>
    </div>
  </div>
</div>

<!-- Modal เพิ่มรายการ -->
<div id="addModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-plus-circle"></i> เพิ่มรายการดำเนินการ</h3>
    <input type="text" id="modalId13" placeholder="เลข 13 หลัก (13 ตัว)" maxlength="13">
    <input type="text" id="modalReason" placeholder="เหตุผล (เช่น ตำรวจจับ, มอบตัว)">
    <button id="confirmAddBtn" style="background: linear-gradient(135deg,#f59e0b,#ef4444);color:white;">ยืนยัน</button>
    <button id="closeModalBtn" style="background:#e2e8f0;">ยกเลิก</button>
  </div>
</div>

<!-- Modal แก้ไขสถานะ -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-edit"></i> แก้ไขสถานะ</h3>
    <p id="editProcessId" style="display:none;"></p>
    <select id="editStatusSelect">
      <option>เสนอผู้พิพากษา</option>
      <option>รอหมายศาล</option>
      <option>รอประสานงาน</option>
      <option>อยู่ระหว่างติดตามตัว</option>
      <option>เสร็จสิ้น</option>
    </select>
    <button id="confirmEditBtn" style="background:#3b82f6;color:white;">บันทึก</button>
    <button id="closeEditModalBtn" style="background:#e2e8f0;">ยกเลิก</button>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/versions/2.23.0/sdk.js"></script>
<script>
  // ========== CONFIG ==========
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxQJvzBmxO09-N4smPuJS4JwS5U8rM738fJRkWFXs-r-sVA-myuLPxjIqZJHj5Y_62fEg/exec";
  const LIFF_ID = "2010276759-IZoVxJjH";
  // ============================

  let lineProfile = { userId: '', displayName: '', pictureUrl: '' };
  let currentEditRowId = null;

  function showLoading(show) {
    const overlay = document.getElementById("loadingOverlay");
    overlay.style.display = show ? "flex" : "none";
  }

  function showDebugUserId(message, userIdValue) {
    const container = document.getElementById("pendingList");
    const userIdToShow = userIdValue || lineProfile.userId || "ไม่ทราบ";
    container.innerHTML = `
      <div style="background:#fef3c7;border-radius:24px;padding:20px;">
        <div style="color:#92400e;font-weight:600;">⚠️ ${message}</div>
        <div style="background:#1f2937;color:#10b981;padding:16px;border-radius:16px;font-family:monospace;margin:12px 0;">
          User ID: ${userIdToShow}
        </div>
        <button onclick="navigator.clipboard.writeText('${userIdToShow}')" style="background:#f59e0b;border:none;padding:10px;border-radius:40px;cursor:pointer;">📋 คัดลอก</button>
        <button onclick="location.reload()" style="background:#6b7280;border:none;padding:10px;border-radius:40px;cursor:pointer;">⟳ ลองใหม่</button>
      </div>
    `;
  }

  async function callGas(action, payload = {}) {
    if (!GAS_URL || GAS_URL === "YOUR_GAS_WEBAPP_URL_HERE") {
      showDebugUserId("ยังไม่ได้ตั้งค่า GAS_URL", "");
      throw new Error("GAS_URL not configured");
    }
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, userId: lineProfile.userId, displayName: lineProfile.displayName, ...payload })
    });
    return await res.json();
  }

  async function loadPending() {
    const container = document.getElementById("pendingList");
    container.innerHTML = '<div class="info-box"><i class="fas fa-spinner fa-pulse"></i> กำลังโหลดรายการค้าง...</div>';
    
    try {
      const result = await callGas("getPending");
      if (!result.success) {
        if (result.error === "Unauthorized user") {
          showDebugUserId("คุณไม่มีสิทธิ์ใช้งาน", lineProfile.userId);
        } else {
          container.innerHTML = `<div class="error-box">❌ ${result.error}</div>`;
        }
        return;
      }
      
      const list = result.data || [];
      if (list.length === 0) {
        container.innerHTML = '<div class="info-box"><i class="fas fa-check-circle"></i> ไม่มีรายการค้าง</div>';
        return;
      }
      
      let html = '<div class="table-wrapper"><table><thead><tr><th>เลข 13 หลัก</th><th>ชื่อ-สกุล</th><th>เหตุผล</th><th>สถานะ</th><th></th></tr></thead><tbody>';
      for (let item of list) {
        let statusClass = "status-pending";
        if (item.status === "เสร็จสิ้น") statusClass = "status-done";
        else if (item.status.includes("รอ")) statusClass = "status-progress";
        
        html += `
          <tr>
            <td>${escapeHtml(item.id13)}</td>
            <td>${escapeHtml(item.fullName)}</td>
            <td>${escapeHtml(item.reason)}</td>
            <td><span class="status-chip ${statusClass}">${escapeHtml(item.status)}</span></td>
            <td><button class="btn-edit" data-row="${item.rowId}"><i class="fas fa-edit"></i> แก้ไข</button></td>
          </tr>
        `;
      }
      html += '</tbody></table></div>';
      container.innerHTML = html;
      
      document.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', () => {
          currentEditRowId = btn.getAttribute('data-row');
          document.getElementById("editModal").style.display = "flex";
        });
      });
      
    } catch(err) {
      container.innerHTML = `<div class="error-box">❌ ${err.message}</div>`;
    }
  }

  async function addProcess() {
    const id13 = document.getElementById("modalId13").value.trim();
    const reason = document.getElementById("modalReason").value.trim();
    
    if (!id13 || !/^\d{13}$/.test(id13)) {
      alert("เลข 13 หลักไม่ถูกต้อง (ต้องเป็นตัวเลข 13 ตัว)");
      return;
    }
    if (!reason) {
      alert("กรุณาใส่เหตุผล");
      return;
    }
    
    showLoading(true);
    try {
      const result = await callGas("addProcess", { id13, reason });
      if (result.success) {
        document.getElementById("addModal").style.display = "none";
        document.getElementById("modalId13").value = "";
        document.getElementById("modalReason").value = "";
        await loadPending();
        alert("✅ เพิ่มรายการเรียบร้อย");
      } else {
        alert("❌ " + (result.error || "เพิ่มไม่สำเร็จ"));
      }
    } catch(err) {
      alert("เกิดข้อผิดพลาด: " + err.message);
    } finally {
      showLoading(false);
    }
  }

  async function updateStatus() {
    if (!currentEditRowId) return;
    const newStatus = document.getElementById("editStatusSelect").value;
    
    showLoading(true);
    try {
      const result = await callGas("updateStatus", { rowId: currentEditRowId, newStatus });
      if (result.success) {
        document.getElementById("editModal").style.display = "none";
        await loadPending();
        alert("✅ อัปเดตสถานะเรียบร้อย");
      } else {
        alert("❌ " + (result.error || "อัปเดตไม่สำเร็จ"));
      }
    } catch(err) {
      alert("เกิดข้อผิดพลาด: " + err.message);
    } finally {
      showLoading(false);
    }
  }

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

  function initLiff() {
    return new Promise((resolve, reject) => {
      liff.init({ liffId: LIFF_ID }, () => {
        if (liff.isLoggedIn()) {
          liff.getProfile().then(profile => {
            lineProfile.userId = profile.userId;
            lineProfile.displayName = profile.displayName;
            lineProfile.pictureUrl = profile.pictureUrl || "";
            document.getElementById("userName").innerText = profile.displayName;
            document.getElementById("userIdDisplay").innerText = profile.userId;
            const avatarDiv = document.getElementById("profileAvatar");
            if (profile.pictureUrl) avatarDiv.innerHTML = `<img src="${profile.pictureUrl}">`;
            else avatarDiv.innerHTML = `<i class="fas fa-user"></i>`;
            document.getElementById("profileSection").classList.remove("hidden");
            resolve();
          }).catch(reject);
        } else {
          liff.login();
          reject(new Error("Need login"));
        }
      }, reject);
    });
  }

  document.getElementById("addProcessBtn").onclick = () => document.getElementById("addModal").style.display = "flex";
  document.getElementById("closeModalBtn").onclick = () => document.getElementById("addModal").style.display = "none";
  document.getElementById("closeEditModalBtn").onclick = () => document.getElementById("editModal").style.display = "none";
  document.getElementById("confirmAddBtn").onclick = addProcess;
  document.getElementById("confirmEditBtn").onclick = updateStatus;

  window.addEventListener("DOMContentLoaded", async () => {
    showLoading(true);
    try {
      await initLiff();
      await loadPending();
    } catch(err) {
      showDebugUserId("เชื่อมต่อ LINE ไม่สำเร็จ", "");
    } finally {
      showLoading(false);
    }
  });
</script>
</body>
</html>
