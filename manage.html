<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#050b14">
  <title>จัดการหมายจับ | Warrant Manager</title>
  
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary-color: #2563eb;
      --bg-dark: #050b14;
      --card-bg: #0f172a;
      --surface-bg: #111827;
      --border-color: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'IBM Plex Sans Thai', sans-serif; background: var(--bg-dark); min-height: 100vh; padding: 20px; color: var(--text-main); }

    .container { max-width: 800px; margin: 0 auto; }
    .system-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; }
    
    /* Wizard Styles */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: var(--surface-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); width: 90%; max-width: 500px; padding: 24px; }
    .wizard-step { display: none; }
    .wizard-step.active { display: block; }
    
    input, select { width: 100%; padding: 12px; margin: 10px 0; background: var(--bg-dark); border: 1px solid var(--border-color); color: white; border-radius: 8px; }
    .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .btn-primary { background: var(--primary-color); color: white; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
  </style>
</head>
<body>

<div class="container">
  <div class="system-card">
    <h2>รายการหมายจับค้างในระบบ</h2>
    <button class="btn btn-primary" style="margin: 20px 0;" onclick="wizardGoToStep(1)">+ เพิ่มรายการใหม่</button>
    <div id="pendingList">กำลังโหลด...</div>
  </div>
</div>

<!-- Wizard Modal -->
<div id="wizardModal" class="modal">
  <div class="modal-content">
    <div id="step1" class="wizard-step active">
      <h3>ระบุเลขบัตรประชาชน (1/4)</h3>
      <input type="number" id="wizId13" placeholder="ระบุเลข 13 หลัก">
      <button class="btn btn-primary" onclick="wizardSearchWarrants()">ค้นหา</button>
    </div>
    
    <div id="step2" class="wizard-step">
      <h3>เลือกหมายจับ (2/4)</h3>
      <div id="wizWarrantList"></div>
      <button class="btn btn-primary" onclick="wizardValidateStep2()">ถัดไป</button>
    </div>

    <div id="step3" class="wizard-step">
      <h3>ระบุข้อมูล (3/4)</h3>
      <select id="wizReason">
        <option value="ตำรวจจับ">ตำรวจจับ</option>
        <option value="มอบตัว">มอบตัว</option>
      </select>
      <select id="wizSubmitTo">
        <option value="ท่าน A">ท่าน A</option>
        <option value="ท่าน B">ท่าน B</option>
      </select>
      <button class="btn btn-primary" onclick="wizardValidateStep3()">ตกลง</button>
    </div>

    <div id="step4" class="wizard-step">
      <h3>ยืนยันข้อมูล (4/4)</h3>
      <div id="summary"></div>
      <button class="btn btn-primary" onclick="wizardSubmitData()">บันทึกข้อมูล</button>
    </div>
  </div>
</div>

<script>
  const GAS_URL = "ใส่ URL ของระบบหลังบ้านตรงนี้";
  let wizData = { id13: '', fullName: '', selectedWarrants: [], reason: '', submitTo: '' };

  function wizardGoToStep(step) {
    document.querySelectorAll('.wizard-step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + step).classList.add('active');
    if (step === 1) document.getElementById('wizardModal').style.display = 'flex';
  }

  async function wizardSearchWarrants() {
    const id13 = document.getElementById("wizId13").value;
    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "search", payload: { searchType: "id13", keyword: id13 }})});
    const result = await res.json();
    
    wizData.id13 = id13;
    wizData.fullName = result.data[0].fullName;
    
    let html = '<table>';
    result.data.forEach(w => {
      html += `<tr><td><input type="checkbox" value="${w.warrantNo}" class="wiz-chk"></td><td>${w.warrantNo}</td></tr>`;
    });
    html += '</table>';
    document.getElementById("wizWarrantList").innerHTML = html;
    wizardGoToStep(2);
  }

  function wizardValidateStep2() {
    wizData.selectedWarrants = Array.from(document.querySelectorAll('.wiz-chk:checked')).map(c => c.value);
    wizardGoToStep(3);
  }

  function wizardValidateStep3() {
    wizData.reason = document.getElementById("wizReason").value;
    wizData.submitTo = document.getElementById("wizSubmitTo").value;
    wizardGoToStep(4);
  }

  async function wizardSubmitData() {
    await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "addProcess", payload: wizData })});
    location.reload();
  }
</script>
</body>
</html>
