<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#050b14">
  <title>จัดการหมายจับ | Warrant Manager</title>
  
  <!-- Modern Fonts and Icons -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary-color: #2563eb;
      --bg-dark: #050b14;
      --card-bg: #0f172a;
      --surface-bg: #111827;
      --border-color: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-dark: #64748b;
      --radius-lg: 18px;
      --radius-md: 14px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Sans Thai', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #050a12 100%);
      min-height: 100vh;
      padding: 24px 16px;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 900px; /* ขยายให้พอดีกับตารางข้อมูลจัดการ */
      margin: 0 auto;
      animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .system-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .system-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #ffffff;
      text-transform: uppercase;
    }

    .system-subtitle {
      margin-top: 6px;
      color: var(--text-dark);
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Profile Section - User Bar */
    .user-bar {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 0 16px;
      margin-bottom: 24px;
    }

    .profile-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .user-bar span {
      color: var(--text-main);
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .staff-role-badge {
      font-size: 11px;
      font-weight: 600;
      background: #1e293b;
      color: #94a3b8;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid #334155;
      margin-right: 8px;
    }

    .online-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .online-text {
      font-size: 11px;
      font-weight: 700;
      color: #10b981;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background-color: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px #10b981;
      animation: pulseGreen 2s infinite;
    }

    @keyframes pulseGreen {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* Buttons */
    .button-group {
      margin-bottom: 24px;
    }

    .action-btn {
      width: 100%;
      height: 56px;
      background: var(--primary-color);
      color: #ffffff;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.5px;
      font-family: inherit;
    }

    .action-btn:hover { background: #1d4ed8; }
    .action-btn:active { transform: scale(0.99); }

    .secondary-btn {
      width: 100%;
      height: 50px;
      background: transparent;
      color: var(--text-muted);
      font-weight: 600;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .secondary-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }

    .btn-edit-small {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-edit-small:hover { background: #3b82f6; border-color: #2563eb; color: white; }

    /* Results Area & Table Intelligence UI */
    .result-section {
      min-height: 0px;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .table-container {
      border-radius: 12px;
      border: 1px solid var(--border-color);
      overflow-x: auto;
      background: var(--card-bg);
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .result-table th {
      padding: 14px 16px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--surface-bg);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
    }

    .result-table td {
      padding: 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      border-bottom: 1px solid var(--border-color);
    }

    .result-table tbody tr { transition: background 0.15s; }
    .result-table tbody tr:hover { background-color: var(--surface-bg); }
    .result-table tbody tr:last-child td { border-bottom: none; }

    /* Custom Military Status Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .badge.success { background: #052e16; color: #86efac; border: 1px solid #064e3b; }
    .badge.info { background: #172554; color: #bfdbfe; border: 1px solid #1e3a8a; }
    .badge.warning { background: #422006; color: #fef08a; border: 1px solid #713f12; }
    .badge.neutral { background: var(--surface-bg); color: var(--text-muted); border: 1px solid var(--border-color); }

    /* Terminal Status Boxes */
    .info-box, .error-box, .success-box {
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.5;
    }

    .info-box { background: var(--surface-bg); color: var(--text-muted); border: 1px solid var(--border-color); }
    .error-box { background: #1c1917; color: #f87171; border: 1px solid #7f1d1d; }
    .success-box { background: #064e3b; color: #a7f3d0; border: 1px solid #047857; }

    /* Modals (Tactical Dark Theme) */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 11, 20, 0.85);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      z-index: 10001;
      opacity: 0;
      animation: modalFadeIn 0.2s forwards ease-out;
    }
    
    @keyframes modalFadeIn {
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      max-width: 450px;
      width: 90%;
      padding: 32px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      transform: translateY(20px);
      animation: modalSlideUp 0.3s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes modalSlideUp {
      to { transform: translateY(0); }
    }

    .modal-content h3 {
      margin-bottom: 24px;
      font-size: 20px;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-content h3 i { color: var(--primary-color); }

    .modal-content input, .modal-content select {
      width: 100%;
      height: 54px;
      padding: 0 16px;
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      font-size: 15px;
      color: #ffffff;
      font-family: inherit;
      transition: var(--transition);
    }

    .modal-content input:focus, .modal-content select:focus {
      outline: none;
      border-color: #3b82f6;
    }
    
    .modal-content select option { background: var(--card-bg); color: white; }
    .modal-content input::placeholder { color: #475569; }

    /* Intel Loading Screen */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 11, 20, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }
    
    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .loading-content {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    .loading-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #ffffff;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .loading-subtitle {
      color: var(--text-dark);
      font-size: 13px;
      margin-bottom: 24px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .loading-bar-container {
      width: 100%;
      height: 4px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }

    .loading-bar {
      width: 50%;
      height: 100%;
      background: var(--primary-color);
      border-radius: 999px;
      animation: loadingSweep 1.5s infinite ease-in-out;
    }

    @keyframes loadingSweep {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(100%); }
      100% { transform: translateX(200%); }
    }

    /* Tactical Debug Card */
    .debug-card {
      background: #111827;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #ef4444;
      text-align: left;
    }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .system-card { padding: 24px; }
      .system-title { font-size: 24px; }
      .user-bar { flex-direction: row; }
      .action-btn { height: 50px; font-size: 15px; }
      .result-table th, .result-table td { padding: 12px 10px; font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- High-Tech Intelligence Loading State -->
<div id="loadingOverlay" class="loading-overlay active">
  <div class="loading-content">
    <div class="loading-title">WARRANT MANAGER</div>
    <div class="loading-subtitle" id="loadingText">SYNCHRONIZING DATABASE</div>
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="system-card">
    <div class="header">
      <div class="system-title">WARRANT MANAGER</div>
      <div class="system-subtitle">ระบบจัดการและอัปเดตสถานะหมายจับ</div>
    </div>

    <!-- Minimalist User Bar -->
    <div id="profileSection" class="user-bar hidden">
      <div class="profile-avatar" id="profileAvatar">
        <i class="fas fa-user"></i>
      </div>
      <span id="userName">-</span>
      <div class="staff-role-badge">STAFF</div>
      <div class="online-indicator">
        <span class="online-text">Connected</span>
        <div class="online-dot"></div>
      </div>
    </div>

    <!-- One Master Tactical Button -->
    <div class="button-group">
      <button class="action-btn" id="addProcessBtn">
        <i class="fas fa-plus-circle"></i> เพิ่มรายการดำเนินการ
      </button>
    </div>

    <!-- Result Console -->
    <div class="result-section" id="pendingList">
      <div class="info-box" style="justify-content: center;">
        <i class="fas fa-satellite-dish fa-pulse"></i> กำลังรอการเชื่อมต่อฐานข้อมูล...
      </div>
    </div>
  </div>
</div>

<!-- Modal เพิ่มรายการ (Tactical Theme) -->
<div id="addModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-plus-circle"></i> เพิ่มรายการดำเนินการ</h3>
    <input type="number" id="modalId13" placeholder="เลขบัตรประชาชน 13 หลัก" autocomplete="off">
    <input type="text" id="modalReason" placeholder="เหตุผล (เช่น ตำรวจจับ, มอบตัว)" autocomplete="off">
    <button id="confirmAddBtn" class="action-btn" style="margin-bottom: 12px;">ยืนยันบันทึกข้อมูล</button>
    <button id="closeModalBtn" class="secondary-btn">ยกเลิก</button>
  </div>
</div>

<!-- Modal แก้ไขสถานะ (Tactical Theme) -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-edit"></i> อัปเดตสถานะ</h3>
    <p id="editProcessId" style="display:none;"></p>
    <select id="editStatusSelect">
      <option>เสนอผู้พิพากษา</option>
      <option>รอหมายศาล</option>
      <option>รอประสานงาน</option>
      <option>อยู่ระหว่างติดตามตัว</option>
      <option>เสร็จสิ้น</option>
    </select>
    <button id="confirmEditBtn" class="action-btn" style="background: #10b981; margin-bottom: 12px;">บันทึกสถานะ</button>
    <button id="closeEditModalBtn" class="secondary-btn">ยกเลิก</button>
  </div>
</div>

<!-- Hidden Data -->
<span id="userIdDisplay" class="hidden"></span>

<script src="https://static.line-scdn.net/liff/edge/versions/2.23.0/sdk.js"></script>
<script>
  // ========== CONFIG ==========
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxQJvzBmxO09-N4smPuJS4JwS5U8rM738fJRkWFXs-r-sVA-myuLPxjIqZJHj5Y_62fEg/exec";
  const LIFF_ID = "2010276759-IZoVxJjH";
  // ============================

  let lineProfile = { userId: '', displayName: '', pictureUrl: '' };
  let currentEditRowId = null;

  function showLoading(show, customText = null) {
    const overlay = document.getElementById("loadingOverlay");
    const textElem = document.getElementById("loadingText");
    
    if (show) {
      if (customText) textElem.innerText = customText.toUpperCase();
      overlay.style.display = "flex";
      setTimeout(() => overlay.classList.add("active"), 10); // Trigger transition
    } else {
      overlay.classList.remove("active");
      setTimeout(() => { 
        overlay.style.display = "none";
        textElem.innerText = "SYNCHRONIZING DATABASE"; 
      }, 300);
    }
  }

  function showDebugUserId(message, userIdValue) {
    const container = document.getElementById("pendingList");
    const userIdToShow = userIdValue || lineProfile.userId || "ไม่ทราบ/ดึงไม่ได้";
    
    container.innerHTML = `
      <div class="debug-card">
        <div style="color: #ef4444; font-weight: 700; margin-bottom: 16px; display: flex; gap: 8px; align-items: center; font-size: 15px;">
          <i class="fas fa-shield-alt"></i> ${message}
        </div>
        <div style="background: #020617; color: #f8fafc; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; word-break: break-all; margin-bottom: 16px; border: 1px solid var(--border-color);">
          <strong style="color: #fca5a5;">🆔 User ID:</strong><br>
          <span id="debugUserIdText" style="display: block; margin-top: 6px; color: #93c5fd;">${userIdToShow}</span>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button onclick="copyDebugUserId()" class="action-btn" style="flex: 1; height: 46px; font-size: 13px; background: #334155;">
            <i class="fas fa-copy"></i> คัดลอก ID
          </button>
          <button onclick="location.reload()" class="action-btn" style="flex: 1; height: 46px; font-size: 13px; background: #1e293b;">
            <i class="fas fa-sync-alt"></i> ลองใหม่
          </button>
        </div>
      </div>
    `;

    window.copyDebugUserId = function() {
      const text = document.getElementById("debugUserIdText").innerText;
      navigator.clipboard.writeText(text).then(() => {
        alert("✅ คัดลอก User ID เรียบร้อย");
      }).catch(() => {
        const tempInput = document.createElement("input");
        tempInput.value = text;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        alert("✅ คัดลอก User ID เรียบร้อย");
      });
    };
  }

  async function callGas(action, payload = {}) {
    if (!GAS_URL || GAS_URL === "YOUR_GAS_WEBAPP_URL_HERE") {
      showDebugUserId("ความล้มเหลวของการตั้งค่า (GAS_URL)", "");
      throw new Error("GAS_URL not configured");
    }
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action, userId: lineProfile.userId, displayName: lineProfile.displayName, ...payload })
    });
    return await res.json();
  }

  async function loadPending() {
    const container = document.getElementById("pendingList");
    
    try {
      const result = await callGas("getPending");
      if (!result.success) {
        if (result.error === "Unauthorized user") {
          showDebugUserId("การเข้าถึงถูกปฏิเสธ (Unauthorized)", lineProfile.userId);
        } else {
          container.innerHTML = `<div class="error-box"><i class="fas fa-exclamation-triangle"></i> ${result.error}</div>`;
        }
        return;
      }
      
      const list = result.data || [];
      if (list.length === 0) {
        container.innerHTML = `<div class="success-box"><i class="fas fa-check-circle"></i> ปัจจุบันไม่มีรายการค้างในสารบบ</div>`;
        return;
      }
      
      let html = `
        <div class="table-container">
          <table class="result-table">
            <thead>
              <tr>
                <th>เลข 13 หลัก</th>
                <th>ชื่อ-สกุล</th>
                <th>เหตุผล</th>
                <th>สถานะ</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody>
      `;

      for (let item of list) {
        let badgeClass = "badge warning"; // Default (Yellow)
        if (item.status === "เสร็จสิ้น") badgeClass = "badge success"; // Green
        else if (item.status.includes("รอ")) badgeClass = "badge info"; // Blue
        
        html += `
          <tr>
            <td style="font-family: monospace; color: #93c5fd;">${escapeHtml(item.id13)}</td>
            <td>${escapeHtml(item.fullName || '-')}</td>
            <td style="color: var(--text-muted);">${escapeHtml(item.reason)}</td>
            <td><span class="${badgeClass}">${escapeHtml(item.status)}</span></td>
            <td>
              <button class="btn-edit-small" data-row="${item.rowId}">
                <i class="fas fa-pen"></i> แก้ไข
              </button>
            </td>
          </tr>
        `;
      }
      html += '</tbody></table></div>';
      container.innerHTML = html;
      
      document.querySelectorAll('.btn-edit-small').forEach(btn => {
        btn.addEventListener('click', () => {
          currentEditRowId = btn.getAttribute('data-row');
          document.getElementById("editModal").style.display = "flex";
        });
      });
      
    } catch(err) {
      container.innerHTML = `<div class="error-box"><i class="fas fa-wifi"></i> เชื่อมต่อฐานข้อมูลล้มเหลว: ${err.message}</div>`;
    }
  }

  async function addProcess() {
    const id13 = document.getElementById("modalId13").value.trim();
    const reason = document.getElementById("modalReason").value.trim();
    
    if (!id13 || !/^\d{13}$/.test(id13)) {
      alert("ข้อบังคับ: เลขบัตรประชาชนต้องเป็นตัวเลข 13 หลัก");
      return;
    }
    if (!reason) {
      alert("ข้อบังคับ: กรุณาระบุเหตุผลการดำเนินการ");
      return;
    }
    
    showLoading(true, "WRITING TO DATABASE...");
    try {
      const result = await callGas("addProcess", { id13, reason });
      if (result.success) {
        document.getElementById("addModal").style.display = "none";
        document.getElementById("modalId13").value = "";
        document.getElementById("modalReason").value = "";
        await loadPending();
        alert("✅ เพิ่มรายการลงระบบเรียบร้อย");
      } else {
        alert("❌ ข้อผิดพลาด: " + (result.error || "บันทึกข้อมูลไม่สำเร็จ"));
      }
    } catch(err) {
      alert("ข้อผิดพลาดทางเทคนิค: " + err.message);
    } finally {
      showLoading(false);
    }
  }

  async function updateStatus() {
    if (!currentEditRowId) return;
    const newStatus = document.getElementById("editStatusSelect").value;
    
    showLoading(true, "UPDATING RECORD...");
    try {
      const result = await callGas("updateStatus", { rowId: currentEditRowId, newStatus });
      if (result.success) {
        document.getElementById("editModal").style.display = "none";
        await loadPending();
        // Option to not alert if you want it to be seamless, but kept for feedback
      } else {
        alert("❌ ข้อผิดพลาด: " + (result.error || "อัปเดตไม่สำเร็จ"));
      }
    } catch(err) {
      alert("ข้อผิดพลาดทางเทคนิค: " + err.message);
    } finally {
      showLoading(false);
    }
  }

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

  function initLiff() {
    return new Promise((resolve, reject) => {
      liff.init({ liffId: LIFF_ID }, () => {
        if (liff.isLoggedIn()) {
          liff.getProfile().then(profile => {
            lineProfile.userId = profile.userId;
            lineProfile.displayName = profile.displayName;
            lineProfile.pictureUrl = profile.pictureUrl || "";
            
            document.getElementById("userName").innerText = profile.displayName;
            const hiddenUserIdSpan = document.getElementById("userIdDisplay");
            if (hiddenUserIdSpan) hiddenUserIdSpan.innerText = profile.userId;
            
            const avatarDiv = document.getElementById("profileAvatar");
            if (profile.pictureUrl) {
              avatarDiv.innerHTML = `<img src="${profile.pictureUrl}" alt="Profile">`;
            } else {
              avatarDiv.innerHTML = `<i class="fas fa-user"></i>`;
            }
            
            document.getElementById("profileSection").classList.remove("hidden");
            resolve();
          }).catch(reject);
        } else {
          liff.login();
          reject(new Error("Need login"));
        }
      }, reject);
    });
  }

  document.getElementById("addProcessBtn").onclick = () => {
    document.getElementById("addModal").style.display = "flex";
  };
  document.getElementById("closeModalBtn").onclick = () => {
    document.getElementById("addModal").style.display = "none";
  };
  document.getElementById("closeEditModalBtn").onclick = () => {
    document.getElementById("editModal").style.display = "none";
  };
  document.getElementById("confirmAddBtn").onclick = addProcess;
  document.getElementById("confirmEditBtn").onclick = updateStatus;

  window.addEventListener("DOMContentLoaded", async () => {
    try {
      await initLiff();
      await loadPending();
    } catch(err) {
      showDebugUserId("การตรวจสอบสิทธิ์ล้มเหลว", "");
    } finally {
      setTimeout(() => showLoading(false), 800);
    }
  });
</script>
</body>
