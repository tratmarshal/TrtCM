<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>จัดการหมายจับ | Warrant Tracker</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 28px 24px;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .profile-section {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      border-radius: 24px;
      margin-bottom: 24px;
    }

    .profile-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: 600;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .status-badge {
      background: #10b981;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-left: auto;
    }

    .btn-add {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .btn-add:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 14px 12px;
      background: #f8fafc;
      font-weight: 600;
      color: #1e293b;
      font-size: 13px;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 14px;
    }

    .status-chip {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-pending { background: #fef3c7; color: #92400e; }
    .status-progress { background: #dbeafe; color: #1e40af; }
    .status-done { background: #d1fae5; color: #065f46; }

    .btn-edit {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .btn-edit:hover {
      background: #2563eb;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 10001;
    }

    .modal-content {
      background: white;
      border-radius: 32px;
      max-width: 500px;
      width: 90%;
      padding: 28px;
    }

    .modal-content h3 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    .modal-content input, .modal-content select {
      width: 100%;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      margin: 12px 0;
      font-size: 14px;
    }

    .modal-content button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e5e7eb;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .info-box, .error-box {
      padding: 20px;
      border-radius: 20px;
      text-align: center;
    }

    .info-box { background: #eff6ff; color: #1e40af; }
    .error-box { background: #fef2f2; color: #dc2626; }

    .hidden { display: none; }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
</div>

<div class="container">
  <div class="glass-card">
    <div class="header">
      <h1><i class="fas fa-tasks"></i> จัดการหมายจับ</h1>
    </div>

    <div id="profileSection" class="profile-section hidden">
      <div class="profile-avatar" id="profileAvatar"><i class="fas fa-user"></i></div>
      <div><strong id="userName">-</strong><br><small id="userIdDisplay">กำลังโหลด...</small></div>
      <div class="status-badge"><i class="fas fa-check-circle"></i> เจ้าหน้าที่</div>
    </div>

    <button class="btn-add" id="addProcessBtn"><i class="fas fa-plus-circle"></i> เพิ่มรายการดำเนินการ</button>

    <div id="pendingList">
      <div class="info-box"><i class="fas fa-spinner fa-pulse"></i> กำลังโหลดข้อมูล...</div>
    </div>
  </div>
</div>

<!-- Modal เพิ่มรายการ -->
<div id="addModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-plus-circle"></i> เพิ่มรายการดำเนินการ</h3>
    <input type="text" id="modalId13" placeholder="เลข 13 หลัก (13 ตัว)" maxlength="13">
    <input type="text" id="modalReason" placeholder="เหตุผล (เช่น ตำรวจจับ, มอบตัว)">
    <button id="confirmAddBtn" style="background: linear-gradient(135deg,#f59e0b,#ef4444);color:white;">ยืนยัน</button>
    <button id="closeModalBtn" style="background:#e2e8f0;">ยกเลิก</button>
  </div>
</div>

<!-- Modal แก้ไขสถานะ -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-edit"></i> แก้ไขสถานะ</h3>
    <p id="editProcessId" style="display:none;"></p>
    <select id="editStatusSelect">
      <option>เสนอผู้พิพากษา</option>
      <option>รอหมายศาล</option>
      <option>รอประสานงาน</option>
      <option>อยู่ระหว่างติดตามตัว</option>
      <option>เสร็จสิ้น</option>
    </select>
