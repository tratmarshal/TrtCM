<!DOCTYPE html>
<html>
  <head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>body { font-family: sans-serif; padding: 15px; }</style>
  </head>
  <body>
    <h3>ระบบค้นหาหมายจับ</h3>
    <input type="text" id="keyword" placeholder="ชื่อ / เลข 13 หลัก / เลขคดี">
    <button onclick="doSearch()">ค้นหา</button>
    <div id="result"></div>

    <script>
      async function doSearch() {
        const keyword = document.getElementById('keyword').value;
        const profile = await liff.getProfile();
        
        google.script.run
          .withSuccessHandler(renderResult)
          .searchWarrant(keyword);
      }

      function renderResult(data) {
        let html = '<table border="1">';
        data.forEach(row => {
          html += `<tr><td>${row[4]}</td><td>${row[5]}</td><td>${row[17]}</td></tr>`; // ชื่อ, 13หลัก, สถานะ
        });
        html += '</table>';
        document.getElementById('result').innerHTML = html;
      }

      liff.init({ liffId: "YOUR_LIFF_ID" });
    </script>
  </body>
</html>
